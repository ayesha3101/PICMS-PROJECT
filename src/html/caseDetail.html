<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PICMS — Case Detail | Karachi Police</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/citizenDashboard.css"/>
  <link rel="stylesheet" href="../css/caseDetail.css"/>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="citizenHome.html" class="nav-brand">
      <div class="nav-logo">
        <img src="../../assets/policeLogo.png" style="width:38px;"/>
      </div>
      <div class="brand-text">
        <span>PICMS</span>
        <span>Karachi Police</span>
      </div>
    </a>
    <div class="nav-right">
      <div class="nav-divider"></div>
      <div class="citizen-info" onclick="window.location.href='citizenProfile.html'">
        <div class="citizen-avatar" id="citizenInitials">--</div>
        <span class="citizen-name" id="citizenName">Loading...</span>
        <svg class="citizen-chevron" viewBox="0 0 24 24"><polyline points="6,9 12,15 18,9"/></svg>
      </div>
    </div>
  </nav>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-label">Menu</div>
      <a class="sidebar-item" href="citizenDashboard.html">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a class="sidebar-item active" href="citizenDashboard.html">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
        My Complaints
      </a>
      <a class="sidebar-item" href="trackCase.html">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Track a Case
      </a>
      <div class="sidebar-divider"></div>
      <div class="sidebar-label">Account</div>
      <a class="sidebar-item" href="citizenProfile.html">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </a>
      <div class="sidebar-divider"></div>
      <a class="sidebar-item sidebar-signout" href="../php/citizenLogout.php">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </a>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- LOADING -->
      <div class="loading-state" id="loadingState">
        <div class="loading-spinner"></div>
        <span>Loading case details...</span>
      </div>

      <!-- CASE CONTENT (hidden until loaded) -->
      <div id="caseContent" style="display:none;">

        <!-- HEADER -->
        <div class="page-header">
          <div>
            <div class="page-eyebrow">
              <div class="eyebrow-line"></div>
              <span class="eyebrow-text" id="caseRef">—</span>
            </div>
            <h1 class="page-title" id="caseTitle">—</h1>
          </div>
          <a href="citizenDashboard.html" class="btn-ghost-sm">
            <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
            Back
          </a>
        </div>

        <!-- TOP ROW -->
        <div class="detail-top-row">

          <!-- STATUS CARD -->
          <div class="detail-card status-card">
            <div class="detail-card-label">Current Status</div>
            <div class="status-large" id="statusLarge">—</div>
            <div class="detail-card-sub" id="statusDate">—</div>
          </div>

          <!-- STATION CARD -->
          <div class="detail-card">
            <div class="detail-card-label">Assigned Station</div>
            <div class="detail-card-val" id="stationName">—</div>
            <div class="detail-card-sub" id="stationAddress">—</div>
          </div>

          <!-- OFFICER CARD -->
          <div class="detail-card">
            <div class="detail-card-label">Investigating Officer</div>
            <div class="detail-card-val" id="officerName">Not yet assigned</div>
            <div class="detail-card-sub" id="officerBadge">—</div>
          </div>

        </div>

        <!-- DETAIL GRID -->
        <div class="two-col">

          <!-- LEFT: COMPLAINT DETAILS -->
          <div class="detail-section">
            <div class="detail-section-title">Complaint Details</div>
            <div class="detail-rows" id="detailRows"></div>
          </div>

          <!-- RIGHT: TIMELINE -->
          <div class="detail-section">
            <div class="detail-section-title">Case Timeline</div>
            <div class="timeline" id="timeline">
              <div class="loading-state" style="padding:16px 0;">
                <div class="loading-spinner"></div>
                <span>Loading timeline...</span>
              </div>
            </div>
          </div>

        </div>

        <!-- APPOINTMENT SECTION -->
        <div class="detail-section" id="appointmentSection" style="display:none;">
          <div class="detail-section-title">Upcoming Appointment</div>
          <div class="appointment-card" id="appointmentCard"></div>
        </div>

      </div>
      <!-- END CASE CONTENT -->

    </main>
  </div>

  <script src="../js/caseDetail.js"></script>
</body>
</html>
