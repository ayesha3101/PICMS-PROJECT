<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Complaints | PICMS</title>
  <link rel="stylesheet" href="../css/citizenDashboard.css" />
</head>
<body>
  <main style="max-width:1000px;margin:30px auto;padding:24px;">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <img src="../../assets/policeLogo.png" alt="Karachi Police Logo" style="width:34px;height:34px;object-fit:contain;" />
        <div>
          <h1 style="margin:0;font-size:1.2rem;">My Complaints</h1>
          <div style="font-size:12px;color:#6b7280;">Signed in as <span id="citizenName">Loading...</span> (<span id="citizenInitials">--</span>)</div>
        </div>
      </div>
      <a href="citizenDashboard.html" class="btn-secondary">Back to Dashboard</a>
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;">
      <input id="searchRef" type="text" placeholder="Search by reference or area" style="min-width:260px;padding:10px 12px;border:1px solid #d9d1c5;border-radius:8px;" />
      <select id="filterStatus" style="padding:10px 12px;border:1px solid #d9d1c5;border-radius:8px;">
        <option value="">All statuses</option>
        <option value="Submitted">Submitted</option>
        <option value="Under Review">Under Review</option>
        <option value="Accepted">Accepted</option>
        <option value="Officer Assigned">Officer Assigned</option>
        <option value="Investigation Ongoing">Investigation Ongoing</option>
        <option value="Withdrawal Pending">Withdrawal Pending</option>
        <option value="Rejected">Rejected</option>
        <option value="Withdrawn">Withdrawn</option>
        <option value="Resolved">Resolved</option>
        <option value="Closed">Closed</option>
      </select>
      <button id="clearFiltersBtn" type="button" class="btn-secondary">Clear</button>
      <span id="resultSummary" style="font-size:12px;color:#6b7280;">0 complaints</span>
    </div>

    <div id="loadingState" class="loading-state">
      <div class="loading-spinner"></div>
      <span>Loading your complaints...</span>
    </div>
    <div id="emptyState" class="empty-state" style="display:none;">
      <p id="emptyText">No complaints found.</p>
    </div>
    <div id="complaintsList"></div>
  </main>

  <script src="../js/citizenCases.js"></script>
</body>
</html>
