<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Case | PICMS</title>
  <link rel="stylesheet" href="../css/citizenDashboard.css" />
</head>
<body>
  <nav class="nav">
    <a href="citizenHome.html" class="nav-brand">
      <div class="nav-logo" style="background: white; border-radius: 50%; padding: 4px; display:flex; align-items:center; justify-content:center;">
        <img src="../../assets/policeLogo.png" style="width:38px;"/>
      </div>
      <div class="brand-text">
        <span>PICMS</span>
        <span>Karachi Police</span>
      </div>
    </a>
    <div class="nav-right">
      <div class="nav-divider"></div>
      <div class="citizen-info" onclick="window.location.href='citizenProfile.html'">
        <div class="citizen-avatar" id="citizenInitials">--</div>
        <span class="citizen-name" id="citizenName">Loading...</span>
        <svg class="citizen-chevron" viewBox="0 0 24 24"><polyline points="6,9 12,15 18,9"/></svg>
      </div>
    </div>
  </nav>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-label">Menu</div>
      <a class="sidebar-item" href="citizenDashboard.html">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a class="sidebar-item" href="myComplaints.html">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
        My Complaints
        <span class="s-badge" id="complaintBadge"></span>
      </a>
      <a class="sidebar-item" href="citizenAppointments.html">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Appointments
        <span class="s-badge" id="appointmentBadge"></span>
      </a>
      <a class="sidebar-item active" href="trackCase.html">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Track a Case
      </a>
      <div class="sidebar-divider"></div>
      <div class="sidebar-label">Account</div>
      <a class="sidebar-item" href="citizenProfile.html">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </a>
      <a class="sidebar-item" href="citizenWithdrawals.html">
        <svg viewBox="0 0 24 24"><path d="M8 7h10"/><path d="M8 12h8"/><path d="M8 17h6"/><path d="M4 4h16v16H4z"/></svg>
        Withdrawals
        <span class="s-badge" id="withdrawalBadge"></span>
      </a>
      <div class="sidebar-divider"></div>
      <a class="sidebar-item sidebar-signout" href="../php/citizenLogout.php">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </a>
    </aside>

    <main class="main">
      <div class="page-header">
        <div>
          <div class="page-eyebrow">
            <div class="eyebrow-line"></div>
            <span class="eyebrow-text">Citizen Portal</span>
          </div>
          <h1 class="page-title">Track <em>a Case</em></h1>
        </div>
        <a href="citizenDashboard.html" class="btn-primary">
          <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
          Back to Dashboard
        </a>
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;">
        <input id="searchRef" type="text" placeholder="Type case reference (e.g., KHI-26-00001)" style="min-width:280px;padding:10px 12px;border:1px solid #d9d1c5;border-radius:8px;" />
        <select id="filterStatus" style="padding:10px 12px;border:1px solid #d9d1c5;border-radius:8px;">
          <option value="">All statuses</option>
          <option value="Submitted">Submitted</option>
          <option value="Under Review">Under Review</option>
          <option value="Accepted">Accepted</option>
          <option value="Officer Assigned">Officer Assigned</option>
          <option value="Investigation Ongoing">Investigation Ongoing</option>
          <option value="Withdrawal Pending">Withdrawal Pending</option>
          <option value="Rejected">Rejected</option>
          <option value="Withdrawn">Withdrawn</option>
          <option value="Resolved">Resolved</option>
          <option value="Closed">Closed</option>
        </select>
        <button id="clearFiltersBtn" type="button" class="btn-secondary">Clear</button>
        <span id="resultSummary" style="font-size:12px;color:#6b7280;">0 complaints</span>
      </div>

      <div id="loadingState" class="loading-state">
        <div class="loading-spinner"></div>
        <span>Loading your complaints...</span>
      </div>
      <div id="emptyState" class="empty-state" style="display:none;">
        <p id="emptyText">No matching cases found.</p>
      </div>
      <div id="complaintsList"></div>
    </main>
  </div>

  <script src="../js/citizenCases.js"></script>
</body>
</html>
